name: CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      MONGO_URI: mongodb://localhost:27017/
      MONGO_DB_NAME: nexsettle_ci_db
      JWT_SECRET: ci-jwt-secret
      GEMINI_API_KEY: ""
      USE_GEMINI: "False"
      USE_CREW_AI: "False"
      AI_ORCHESTRATOR: langgraph
      EMAIL_HOST_USER: your-email@gmail.com
      EMAIL_HOST_PASSWORD: your-app-password-here

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        working-directory: backend
        run: |
          python -m compileall apps nexsettle management utils db

      - name: Django system checks
        working-directory: backend
        run: |
          python manage.py check

      - name: Bootstrap DB and run smoke flow
        working-directory: backend
        run: |
          python manage.py setup_mongodb
          python manage.py backfill_user_ids
          python manage.py smoke_test_flow
